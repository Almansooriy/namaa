<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Namā | Add Product</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>

<body>

<header class="navbar">
  <div class="logo">Namā Admin</div>
  <nav class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="products.html">Products</a>
  </nav>
</header>

<!-- HERO -->
<section class="products-hero">
  <div class="overlay"></div>
  <div class="products-hero-content">
    <h1>Add Product</h1>
    <p>Create a new product</p>
  </div>
</section>

<!-- FORM -->
<section class="products-section">

  <div class="form-container">

    <form>

      <div class="form-group">
        <label>Product Name</label>
        <input type="text" id="nameInput" placeholder="e.g. Red Roses">
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea></textarea>
      </div>

      <div class="form-group">
        <label>Price (SAR)</label>
        <input type="number" id="priceInput">
      </div>

      <div class="form-group">
        <label>Stock</label>
        <input type="number">
      </div>

      <div class="form-group">
        <label>Image URL</label>
        <input type="text" id="imgInput" placeholder="https://..." oninput="previewImage()">
      </div>

      <div class="form-group">
        <label>Category</label>
        <select>
          <option value="1">Flowers</option>
          <option value="2">Plants</option>
          <option value="3">Coffee</option>
          <option value="4">Chocolates</option>
          <option value="5">Packages</option>
        </select>
      </div>

      <button class="btn">Add Product</button>

    </form>

    <!-- PREVIEW -->
    <div class="product-card" id="previewCard" style="display:none; max-width:250px; margin-top:30px;">
      <img id="previewImg" src="" style="width:100%; border-radius:10px;">
      <div class="product-details">
        <h3 id="previewName">Product Name</h3>
        <p>Preview</p>
        <span id="previewPrice">0 SAR</span>
      </div>
    </div>

  </div>

</section>

<footer>
  <p>© 2026 Namā</p>
</footer>

<script>
function previewImage() {
  const url = document.getElementById("imgInput").value;
  const img = document.getElementById("previewImg");
  const card = document.getElementById("previewCard");

  if (url) {
    img.src = url;
    card.style.display = "block";
  } else {
    card.style.display = "none";
  }
}

document.getElementById("nameInput").oninput = function() {
  document.getElementById("previewName").innerText = this.value;
}

document.getElementById("priceInput").oninput = function() {
  document.getElementById("previewPrice").innerText = this.value + " SAR";
}
</script>

</body>
</html>
