<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Product</title>
<link rel="stylesheet" href="../../assets/css/style.css">

</head>

<body>
  <header class="navbar">
  <div class="logo">Namā</div>

  <nav class="nav-links">
    <a href="../index.html">Home</a>
    <a href="../pages/products.html">Products</a>
    <a href="../pages/add-product.html">Add Product</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
    <a href="#">Cart</a>
    <a href="#">Login</a>
  </nav>
</header>

<div class="container">
  <h2>Add Product</h2>

  <form>

    <!-- Product Name -->
    <input type="text" placeholder="Product Name" required>

    <!-- Product Description -->
    <textarea placeholder="Description"></textarea>

    <!-- Product Price -->
    <input type="number" placeholder="Price" required>

    <!-- Product Stock -->
    <input type="number" placeholder="Stock" required>

    <!-- Image URL Input -->
    <input type="text" id="imageInput" placeholder="Image URL">

    <!-- Image Preview -->
    <img id="preview" src="" alt="Preview">

    <!-- Category Selection -->
    <select>
      <option value="1">Flowers</option>
      <option value="2">Plants</option>
    </select>

    <!-- Submit Button -->
    <button type="submit">Add Product</button>

  </form>
</div>

<script>
// Live preview for image URL
const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");

input.addEventListener("input", function() {
  preview.src = input.value;
});
</script>

</body>
</html>
