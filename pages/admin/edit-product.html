<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Product</title>
<link rel="stylesheet" href="../../assets/css/style.css">
</head>

<body>

<!-- Navbar -->
<header class="navbar">
  <div class="logo">Namā</div>

  <nav class="nav-links">
    <a href="../index.html">Home</a>
    <a href="../pages/products.html">Products</a>
    <a href="../pages/add-product.html">Add Product</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
    <a href="#">Cart</a>
    <a href="#">Login</a>
  </nav>
</header>

<!-- Page Section -->
<section class="products">

  <div class="product-card">

    <!-- Image Preview -->
    <img id="preview" src="https://www.fnp.sa/cdn/shop/files/Red_Rose_Flower_Bouquet_Fresh_Flower_Delivery_in_Saudi_Arabia_1.jpg">

    <form>

      <!-- Product Name -->
      <input type="text" value="Rose Bouquet">

      <!-- Description -->
      <textarea>A timeless bouquet with soft, elegant roses.</textarea>

      <!-- Price -->
      <input type="number" value="120">

      <!-- Stock -->
      <input type="number" value="10">

      <!-- Image URL -->
      <input type="text" id="imageInput"
      value="https://www.fnp.sa/cdn/shop/files/Red_Rose_Flower_Bouquet_Fresh_Flower_Delivery_in_Saudi_Arabia_1.jpg">

      <!-- Category -->
      <select>
        <option value="1" selected>Flowers</option>
        <option value="2">Plants</option>
      </select>

      <!-- Save Button -->
      <button type="submit">Save Changes</button>

      <!-- Delete Button -->
      <button type="button" class="delete-btn" onclick="openModal()">
        Delete Product
      </button>

    </form>

  </div>

</section>

<!-- Delete Confirmation Modal -->
<div id="deleteModal" class="modal">
  <div class="modal-content">
    <h3>Delete Product</h3>
    <p>Are you sure you want to delete this product?</p>

    <div class="modal-buttons">
      <button onclick="deleteProduct()" class="confirm-btn">Yes, Delete</button>
      <button onclick="closeModal()" class="cancel-btn">Cancel</button>
    </div>
  </div>
</div>

<script>
// Live image preview
const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");

input.addEventListener("input", function() {
  preview.src = input.value;
});

// Open modal
function openModal() {
  document.getElementById("deleteModal").style.display = "flex";
}

// Close modal
function closeModal() {
  document.getElementById("deleteModal").style.display = "none";
}

// Confirm delete
function deleteProduct() {
  alert("Product deleted (demo)");
  closeModal();
}
</script>

</body>
</html>
