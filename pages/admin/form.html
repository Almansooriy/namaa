<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Form</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<script src="../../assets/js/form.js" defer></script>
</head>

<body>

<!-- Navbar -->
<header class="navbar">
  <div class="logo">Namā</div>
  <nav class="nav-links">
    <a href="../../index.html">Home</a>
    <a href="../products.html">Products</a>
    <a href="admin-dashboard.html">Dashboard</a>
    <a href="">About</a>
    <a href="#">Contact</a>
    <a href="#">Cart</a>
    <a href="admin-login.html">Logout</a>
  </nav>
</header>

<div class="container">
  <h2 id="title">Product Form</h2>

  <form id="productForm">

    <!-- Image Preview -->
    <img id="preview" src="" alt="Preview" style="max-width:200px; margin-bottom:10px;">

    <!-- Product Name -->
    <input type="text" id="name" placeholder="Product Name" required>

    <!-- Description -->
    <textarea id="description" placeholder="Product Description"></textarea>

    <!-- Price -->
    <input type="number" id="price" placeholder="Price" required>

    <!-- Stock -->
    <input type="number" id="stock" placeholder="Stock" required>

    <!-- Image URL -->
    <input type="text" id="imageInput" placeholder="Image URL">

    <!-- Category -->
    <select id="category">
      <option value="1">Flowers</option>
      <option value="2">Plants</option>
    </select>

    <!-- Buttons -->
    <button type="submit" id="saveBtn">Save</button>
    <button type="button" id="deleteBtn">Delete</button>

  </form>
</div>

<footer>
  <p>&copy; 2026 Namā. All rights reserved.</p>
</footer>


</body>
</html>
