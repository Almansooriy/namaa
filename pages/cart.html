<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Namā |  Cart</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="../assets/js/cart.js" defer></script>
</head>
<body>

<header class="navbar">
  <div class="logo">
  <img src="../assets/images/logo2.png" alt="logo">
  <span>Namā</span>
  </div>
  <nav class="nav-links">
      <a href="../index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="../index.html#about">About</a>
      <a href="contact.html">Contact</a>
      <a href="cart.html" class="cart-icon">
        🛒
        <span id="cart-count">0</span>
      </a>
      <a href="admin/admin-login.html">Login</a>
  </nav>
</header>
 
<main class="cart-page">
  <div class="cart-wrapper">
    <div class="cart-left-section">
      
      <section class="cart-items-container">
        <h1>Your Cart</h1>
        <div id="cartItemsList">
          </div>
      </section>

      <section class="checkout-form-section">
        <h2>Shipping Information</h2>
        <form id="combinedCheckoutForm">
          <div class="form-row">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="fullName" placeholder="Sarah Ahmed" required>
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" id="phone" placeholder="05XXXXXXXX" required>
            </div>
          </div>
          
          <div class="form-group">
            <label>City</label>
            <select id="city" required>
              <option value="khobar">Al Khobar</option>
              <option value="dammam">Dammam</option>
              <option value="riyadh">Riyadh</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>Delivery Address</label>
            <textarea id="address" placeholder="District, Street name, House number" required></textarea>
          </div>

          <h2 style="margin-top: 30px;">Payment Method</h2>
          <div class="payment-grid">
            <label class="payment-option">
              <input type="radio" name="payment" value="mada" checked>
              <span>Mada / Visa</span>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment" value="apple">
              <span>Apple Pay</span>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment" value="cod">
              <span>Cash on Delivery</span>
            </label>
          </div>
        </form>
      </section>
    </div>

    <aside class="cart-right-section">
      <div class="summary-box">
        <h2>Order Summary</h2>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="subtotal-val">0.00 SAR</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span>30.00 SAR</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="total-val">0.00 SAR</span>
        </div>
        <div class="customization-box">
          <h3>Customize Your Order</h3>
          <label class="custom-option">
            <input type="checkbox" name="addon" value="chocolate">Chocolate</label>
            <label class="custom-option">
              <input type="checkbox" name="addon" value="coffee">Coffee</label>
              <textarea id="customNote" placeholder="Write any special request (type of chocolate, coffee details, etc...)"></textarea>
            </div>
        <button type="submit" class="checkout-btn" form="combinedCheckoutForm">Complete Order</button>
        <button onclick="clearCart()" class="delete-all-btn">Delete All</button>
        <a href="products.html" class="continue-link">Continue Shopping</a>
      </div>
    </aside>
  </div>
</main>
<footer>
  <p>&copy; 2026 Namā. All rights reserved.</p>
</footer>

</body>
</html>
