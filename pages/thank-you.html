<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Namā | Thank You</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  
   
 
</head>
<body>

<main class="thank-you-container">
    <div style="padding-top: 50px;">
        <h1>Thank You!</h1>
        <p>Your order has been placed successfully.</p>
    </div>

    <div class="history-section-wrapper">
        <h2 class="main-history-title">My Orders</h2>
        <div id="orderHistoryList"></div>
    </div>

    <div style="margin-bottom: 50px;">
        <a href="../home.html" class="home-btn">Back to Home</a>
    </div>
</main>

<script>
document.addEventListener("DOMContentLoaded", function() {
    function getCookie(name) {
        let nameEQ = name + "=";
        let ca = document.cookie.split(';');
        for(let i=0; i < ca.length; i++) {
            let c = ca[i].trim();
            if (c.indexOf(nameEQ) == 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
        }
        return null;
    }

    const rawData = getCookie("nama_past_purchases");
    
    if (rawData) {
        try {
            const history = JSON.parse(rawData);
            const listDiv = document.getElementById("orderHistoryList");

            if (history && history.length > 0) {
                // تجميع المنتجات حسب التاريخ
                const groupedOrders = history.reduce((acc, item) => {
                    if (!acc[item.date]) acc[item.date] = [];
                    acc[item.date].push(item);
                    return acc;
                }, {});

                let contentHtml = '';
                
                Object.keys(groupedOrders).reverse().forEach((date) => {
                    const items = groupedOrders[date];
                    const randomID = Math.floor(100000 + Math.random() * 900000);
                    
                    contentHtml += `
                        <div class="order-history-card">
                            <span class="order-id-display">🛒 Order #${randomID}</span>
                            
                            <div class="meta-row">
                                <span class="status-capsule">Delivered Successfully</span>
                                <span class="static-date-text">${date}</span>
                            </div>

                            <ul class="items-list-container">
                                ${items.map(i => `
                                    <li class="product-row-item">
                                        <span style="margin-right:8px;">•</span> 
                                        ${i.name} (x${i.quantity})
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    `;
                });
                listDiv.innerHTML = contentHtml;
            }
        } catch (err) {
            console.error("History Render Error:", err);
        }
    }
});
</script>

</body>
</html>
